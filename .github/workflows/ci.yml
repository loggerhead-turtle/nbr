name: CI

# Typecheck + unit tests on every push and PR. Runs on GitHub's runners, which
# have internet access for `prisma generate` (the engine download is what fails
# in the sandboxed agent environment).
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Don't try to fetch Chromium during install — not needed for typecheck/tests.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      # Terminology guard: the site uses "rating", never "ranking". Fail if
      # "ranking"/"rankings"/"ranked" appears anywhere under apps/web (see
      # CLAUDE.md). Use "rating"/"rated"/"sorted"/"ordered" instead.
      - name: No "ranking" in the website
        run: |
          if grep -rinE '\b(ranking|rankings|ranked)\b' apps/web \
               --include='*.ts' --include='*.tsx' --include='*.css' \
               --include='*.md' --include='*.json'; then
            echo "::error::Use 'rating'/'sorted'/'ordered' — never 'ranking'/'ranked' — in apps/web (see CLAUDE.md)."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @nbr/db generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test
