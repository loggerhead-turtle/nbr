# Render blueprint for National Baseball Ratings.
# Web service runs Next.js (no Chromium). Two cron jobs run the worker:
# a schedule-aware scraper and a semi-weekly rating recompute.
#
# The shared "nbr" env group is defined below so Render creates it on apply and
# prompts for the secret values (DATABASE_URL/DIRECT_URL from Supabase, etc.).

envVarGroups:
  - name: nbr
    envVars:
      # Supabase Postgres — paste on apply. DATABASE_URL = pooled (6543),
      # DIRECT_URL = direct (5432).
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # Final public URL (drives SEO canonical links + sitemap). Production:
      # https://nbrball.com (the primary; www.nbrball.com redirects to it). No
      # trailing slash.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      # Admin login password — paste on apply.
      - key: ADMIN_PASSWORD
        sync: false
      # Cookie-signing secret — let Render generate a strong value.
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      # On-add instant scrape: when a team is added, the web app calls Render's
      # Job API to scrape just that team and recompute. Paste an API key and the
      # nbr-scraper service ID (it has Chromium). Leave blank to fall back to the
      # scheduled scraper picking the team up on its next run.
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_WORKER_SERVICE_ID
        sync: false
      # Scraper controls. Leave disabled until you're ready.
      - key: SCRAPER_ENABLED
        value: "false"
      - key: SCRAPER_MAX_TEAMS_PER_RUN
        value: "25"
      - key: SCRAPER_POSTGAME_DELAY_HOURS
        value: "2.5"

services:
  - type: web
    name: nbr-web
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter @nbr/db generate && pnpm --filter @nbr/db migrate && pnpm --filter @nbr/web build
    startCommand: pnpm --filter @nbr/web start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - fromGroup: nbr

  # Schedule-aware scraper. Runs hourly but only acts on teams that are "due"
  # (post-game fetch ~2-3h after a game ends; weekly otherwise; monthly when
  # dormant). Needs Chromium, so use a Docker runtime for reliable system deps.
  - type: cron
    name: nbr-scraper
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    schedule: "17 * * * *" # hourly, at :17 (avoids round-number patterns)
    # Docker build (Chromium) is expensive in pipeline minutes and the scraper
    # rarely changes — deploy it manually when its code does, not on every push.
    autoDeploy: false
    envVars:
      - fromGroup: nbr

  # Rating recompute, semi-weekly (Sun & Wed mornings, after weekend/Mon games).
  # MaxPreps harvester (Utah HS varsity). HS season is over, so this is run
  # manually via Trigger Run; the schedule is just a rare placeholder.
  - type: cron
    name: nbr-maxpreps
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerCommand: pnpm --filter @nbr/worker maxpreps
    schedule: "0 9 1 7 *" # 09:00 on Jul 1 (placeholder; trigger manually)
    # Expensive Docker build + placeholder schedule — deploy manually only.
    autoDeploy: false
    envVars:
      - fromGroup: nbr

  # Recompute needs no browser, so it runs on the plain Node runtime (no Docker).
  - type: cron
    name: nbr-recompute
    runtime: node
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter @nbr/db generate
    startCommand: pnpm --filter @nbr/worker recompute
    schedule: "0 8 * * 0,3"
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - fromGroup: nbr

  # One-time / occasional geocode backfill: fills team latitude/longitude from
  # the bundled city centroids so the scrimmage finder can match by distance.
  # Idempotent (only fills missing coords) — run manually via Trigger Run; the
  # schedule is just a far-future placeholder.
  - type: cron
    name: nbr-geocode
    runtime: node
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter @nbr/db generate
    startCommand: pnpm --filter @nbr/worker geocode
    schedule: "0 9 1 1 *" # 09:00 on Jan 1 (placeholder; trigger manually)
    # Placeholder schedule, run manually — no need to rebuild on every push.
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: "22"
      - fromGroup: nbr
